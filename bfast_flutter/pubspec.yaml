name: bfast_flutter
description: BFast tap-to-pay cross-platform payment app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'
  flutter: '>=3.19.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.6.1

  # Navigation
  go_router: ^17.2.3

  # BLE
  flutter_blue_plus: ^2.3.9

  # Sensors (accelerometer + gyroscope)
  sensors_plus: ^7.0.0

  # Permissions
  permission_handler: ^12.0.3

  # HTTP
  dio: ^5.9.2

  # Secure storage (auth tokens)
  flutter_secure_storage: ^10.3.1

  # Preferences
  shared_preferences: ^2.5.5

  # Toast
  fluttertoast: ^9.0.0

  # UUID generation
  uuid: ^4.5.3

  # Logging
  logger: ^2.7.0

  # Utilities
  intl: ^0.20.2
  connectivity_plus: ^7.1.1
  device_info_plus: ^12.4.0

  # Cryptography (ECDH key exchange for secure BLE session)
  cryptography: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  mockito: ^5.4.4
  build_runner: ^2.4.11
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
